name: E2E

on:
  pull_request:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - android-apk-ready
  workflow_dispatch:
    inputs:
      android_run_id:
        description: Tink-Super-App workflow run id containing the APK artifact
        required: false
        default: ""
      android_artifact_name:
        description: Tink-Super-App APK artifact name
        required: false
        default: tink-android-debug-apk

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  api:
    runs-on: ubuntu-latest
    env:
      TINK_API_BASE_URL: https://api.tinks.app/dev
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: uv sync
      - run: mkdir -p reports/api
      - name: Run API E2E tests
        id: pytest
        shell: bash
        run: |
          set +e
          uv run pytest tests/api --bdd-report=reports/api/bdd-report.html
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Prepare API report
        if: always()
        run: |
          if [ -f reports/api/bdd-report.html ]; then
            cp reports/api/bdd-report.html reports/api/index.html
          else
            cat > reports/api/index.html <<'HTML'
          <!doctype html><html><body><h1>API E2E report was not generated.</h1></body></html>
          HTML
          fi
      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-report-site
          path: reports/api
          if-no-files-found: warn
      - name: Fail if API tests failed
        if: always() && steps.pytest.outputs.status != '0'
        run: exit ${{ steps.pytest.outputs.status }}

  android-appium:
    if: github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && inputs.android_run_id != '')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        suite:
          - e2e
          - mock
    env:
      TINK_RUN_APPIUM: "1"
      TINK_ANDROID_RUN_ID: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.android_run_id || inputs.android_run_id }}
      TINK_ANDROID_ARTIFACT_NAME: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.artifact_name || inputs.android_artifact_name }}
      TINK_ANDROID_SUITE: ${{ matrix.suite }}
    steps:
      - name: Checkout tink-test
        uses: actions/checkout@v4
      - name: Download Android debug APK
        uses: actions/download-artifact@v4
        with:
          repository: TinkZhang/Tink-Super-App
          run-id: ${{ env.TINK_ANDROID_RUN_ID }}
          name: ${{ env.TINK_ANDROID_ARTIFACT_NAME }}
          path: android-apk
          github-token: ${{ secrets.TINK_ANDROID_ARTIFACT_TOKEN || github.token }}
      - name: Locate Android debug APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          apk_path="$(find android-apk -type f -name '*.apk' | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "No APK found in downloaded artifact"
            find android-apk -maxdepth 5 -type f
            exit 1
          fi
          echo "path=${GITHUB_WORKSPACE}/${apk_path}" >> "$GITHUB_OUTPUT"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: uv sync
      - name: Install Appium
        run: |
          npm install -g appium@2.19.0
          appium driver install --source=npm appium-uiautomator2-driver@4.2.9
          appium --version
          appium driver list --installed
      - name: Enable KVM for Android emulator
        run: |
          if [ -e /dev/kvm ]; then
            sudo adduser "$USER" kvm
            sudo chown "$USER":"$USER" /dev/kvm
            sudo chmod 660 /dev/kvm
            ls -l /dev/kvm
          else
            echo "/dev/kvm is not available on this runner"
          fi
      - run: mkdir -p "reports/android/${TINK_ANDROID_SUITE}"
      - name: Run Android Appium BDD tests
        id: appium
        continue-on-error: true
        timeout-minutes: 25
        uses: reactivecircus/android-emulator-runner@v2
        env:
          TINK_ANDROID_APK_PATH: ${{ steps.apk.outputs.path }}
          TINK_ANDROID_API_BASE_URL_OVERRIDE: ${{ matrix.suite == 'mock' && 'http://10.0.2.2:8765/' || '' }}
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics -memory 4096 -cores 2
          script: bash .github/scripts/run_android_appium_suite.sh
      - name: Prepare Android reports
        if: always()
        shell: bash
        run: |
          suite="${TINK_ANDROID_SUITE}"
          if [ -f "reports/android/$suite/bdd-report.html" ]; then
            cp "reports/android/$suite/bdd-report.html" "reports/android/$suite/index.html"
          else
            cat > "reports/android/$suite/bdd-report.html" <<HTML
          <!doctype html>
          <html>
            <body>
              <h1>Android $suite BDD report was not generated</h1>
              <p>The emulator/Appium step ended before pytest-bdd-report could run.</p>
              <p>Open the GitHub Actions job log for the <strong>Run Android Appium BDD tests</strong> step to inspect emulator boot and Appium startup output.</p>
              <p>Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}</p>
            </body>
          </html>
          HTML
            cp "reports/android/$suite/bdd-report.html" "reports/android/$suite/index.html"
          fi
      - name: Upload Android reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.suite }}-report-site
          path: reports/android/${{ matrix.suite }}
          if-no-files-found: warn
      - name: Upload Appium log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.suite }}-logs
          path: |
            appium-${{ matrix.suite }}.log
            logcat-${{ matrix.suite }}.log
          if-no-files-found: ignore
      - name: Fail if Android tests failed
        if: always() && (steps.appium.outcome == 'failure' || steps.appium.outputs.status != '0')
        run: exit 1

  pages:
    runs-on: ubuntu-latest
    needs:
      - api
      - android-appium
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          path: downloaded-reports
      - name: Build report site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/api reports/android
          if [ -d downloaded-reports/api-report-site ]; then
            cp -R downloaded-reports/api-report-site/. reports/api/
          fi
          if [ -d downloaded-reports/android-e2e-report-site ]; then
            mkdir -p reports/android/e2e
            cp -R downloaded-reports/android-e2e-report-site/. reports/android/e2e/
          fi
          if [ -d downloaded-reports/android-mock-report-site ]; then
            mkdir -p reports/android/mock
            cp -R downloaded-reports/android-mock-report-site/. reports/android/mock/
          fi

          cat > reports/index.html <<'HTML'
          <!doctype html>
          <html>
            <head><meta charset="utf-8"><title>Tink Test Reports</title></head>
            <body>
              <h1>Tink Test Reports</h1>
              <ul>
                <li><a href="api/index.html">API BDD report</a></li>
                <li><a href="android/e2e/index.html">Android Appium E2E BDD report</a></li>
                <li><a href="android/mock/index.html">Android Appium Mock BDD report</a></li>
              </ul>
            </body>
          </html>
          HTML
      - name: Upload combined reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combined-reports
          path: reports
          if-no-files-found: warn
      - name: Upload Pages artifact
        if: >-
          always() &&
          ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'repository_dispatch' ||
          github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports
      - name: Deploy to GitHub Pages
        id: deployment
        if: >-
          always() &&
          ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'repository_dispatch' ||
          github.event_name == 'workflow_dispatch')
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Fail if upstream tests failed
        if: always() && (needs.api.result != 'success' || (needs.android-appium.result != 'success' && needs.android-appium.result != 'skipped'))
        run: exit 1
