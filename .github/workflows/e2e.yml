name: E2E

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api:
    runs-on: ubuntu-latest
    env:
      TINK_API_BASE_URL: https://api.tinks.app/dev
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: uv sync
      - run: mkdir -p reports
      - run: uv run pytest --bdd-report=reports/bdd-report.html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bdd-report
          path: reports/bdd-report.html
          if-no-files-found: ignore
